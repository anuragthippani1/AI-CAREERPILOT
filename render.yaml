services:
  - type: web
    name: careerpilot-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: careerpilot
      - key: DB_PORT
        value: 3306
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false




